<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/style.css">
    <!-- DaisyUI & TailwindCSS CDS -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-[#f4f5f7] h-[100vh] flex justify-center items-center">
    <!-- Login Section -->
    <section id="login-section" class="flex flex-col items-center">
        <div class="mb-10">
            <img src="../assets/Logo-full.png" alt="Payoo Logo">
        </div>
        <form class="space-y-5 bg-[#FFFFFF] p-5 min-w-[330px] rounded-xl">
            <div class="flex flex-col space-y-2">
                <h1 class="text-base font-semibold">Mobile Number</h1>
                <input id="input-number" type="text" placeholder="Enter Mobile Number" class="input bg-[#f4f5f7] rounded-full border-none focus:outline-none focus:ring-0" />
            </div>
            <div class="flex flex-col space-y-2">
                <h1 class="text-base font-semibold">4 Digit Pin</h1>
                <input id="input-pin" type="password" placeholder="Enter 4 Digit Pin" class="input bg-[#f4f5f7] rounded-full border-none focus:outline-none focus:ring-0" />
            </div>
            <div>
                <button type="button" onclick="logIn()" class="btn w-full bg-[#3B25C1] text-xl font-semibold text-white border-none rounded-full">Login</button>
            </div>
        </form>
    </section>
    <script src="js/script.js"></script>
    <script src="js/utility.js"></script>
</body>
</html>
